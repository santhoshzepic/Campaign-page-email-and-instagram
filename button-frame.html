<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primary Button Frame</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      :root {
        --primary: #23235f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7ff;
        font-family: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .frame {
        width: 480px;
        height: 280px;
        display: grid;
        place-items: center;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 56px;
        padding: 0 24px;
        border: 0;
        border-radius: 9999px;
        background: var(--primary);
        color: #ffffff;
        font-size: 20px;
        font-weight: 700;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <button class="btn-primary" type="button">Primary Button</button>
    </div>
  </body>
</html>
